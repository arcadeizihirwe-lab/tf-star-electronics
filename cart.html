<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart</title>

<style>

body{
    font-family:Arial;
    background:#111;
    color:white;
    margin:40px;
}

h1{
    color:gold;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #555;
    padding:12px;
    text-align:center;
}

th{
    background:gold;
    color:black;
}

button{
    padding:10px 20px;
    background:gold;
    border:none;
    cursor:pointer;
}

button:hover{
    background:white;
}

</style>

</head>

<body>

<h1>🛒 Shopping Cart</h1>

<table>

<thead>

<tr>
<th>Product</th>
<th>Price</th>
</tr>

</thead>

<tbody id="cartItems">

</tbody>

</table>

<h2 id="total"></h2>

<button onclick="checkout()">
Proceed to Checkout
</button>

<!-- ✅ SEND BUTTON ADDED HERE -->
<br><br>

<button onclick="sendWhatsAppOrder()">
📲 Send Order on WhatsApp
</button>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let table = document.getElementById("cartItems");

let total = 0;

cart.forEach(item=>{

table.innerHTML +=
`
<tr>
<td>${item.name}</td>
<td>$${item.price}</td>
</tr>
`;

total += item.price;

});

document.getElementById("total").innerHTML =
"Total: $" + total;

function checkout(){

alert("Thank you for shopping with TF STAR!");

localStorage.removeItem("cart");

location.reload();

}

/* ✅ WHATSAPP FUNCTION ADDED */
function sendWhatsAppOrder(){

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let phone = "250781414192"; // 🔴 change this

    if(cart.length === 0){
        alert("Your cart is empty!");
        return;
    }

    let message = "🛒 TF STAR Electronics Order:%0A%0A";
    let total = 0;

    cart.forEach(item => {
        message += "- " + item.name + " ($" + item.price + ")%0A";
        total += item.price;
    });

    message += "%0ATotal: $" + total;

    let url = "https://wa.me/" + phone + "?text=" + message;

    window.open(url, "_blank");
}

</script>

</body>
</html>
